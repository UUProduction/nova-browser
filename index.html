<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ░░ BACKGROUND ░░ -->
<div id="bg-layer"></div>

<!-- ░░ IDLE OVERLAY ░░ -->
<div id="idle-overlay" class="hidden">
  <div class="idle-card">
    <div class="idle-moon">🌙</div>
    <h2>NOVA IDLE</h2>
    <p>RAM Purged · Iframe Suspended</p>
    <button id="idle-resume">Resume Session</button>
  </div>
</div>

<!-- ░░ BACKGROUND MODAL ░░ -->
<div id="bg-modal" class="hidden">
  <div class="modal-card">
    <h3>Change Background</h3>
    <div class="bg-options">
      <button class="bg-swatch selected" data-bg="aurora"   style="background:linear-gradient(135deg,#fce4ec,#e3f2fd,#f3e5f5)">Aurora</button>
      <button class="bg-swatch" data-bg="midnight" style="background:linear-gradient(135deg,#0a0c1a,#1a1060,#0d2a55);color:#aaf">Midnight</button>
      <button class="bg-swatch" data-bg="peach"    style="background:linear-gradient(135deg,#ffdde1,#ee9ca7)">Peach</button>
      <button class="bg-swatch" data-bg="forest"   style="background:linear-gradient(135deg,#134e5e,#71b280);color:#dff">Forest</button>
      <button class="bg-swatch" data-bg="slate"    style="background:linear-gradient(135deg,#232526,#414345);color:#ccc">Slate</button>
      <button class="bg-swatch" data-bg="lavender" style="background:linear-gradient(135deg,#c9d6ff,#e2e2e2)">Lavender</button>
      <button class="bg-swatch" data-bg="sunset"   style="background:linear-gradient(135deg,#f7971e,#ffd200)">Sunset</button>
      <button class="bg-swatch" data-bg="ocean"    style="background:linear-gradient(135deg,#2980b9,#6dd5fa)">Ocean</button>
    </div>
    <label class="custom-url-label">
      Or paste an image URL:
      <input id="custom-bg-input" type="url" placeholder="https://..."/>
    </label>
    <div class="modal-actions">
      <button id="apply-bg-btn">Apply</button>
      <button id="close-modal-btn">Cancel</button>
    </div>
  </div>
</div>

<!-- ░░ SHELL ░░ -->
<div id="shell">

  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-brand">N</div>

    <div class="sidebar-group top">
      <button class="sb-btn active" id="btn-home" data-tip="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12l2-2m0 0l7-7 7 7M5 10v10h4v-6h6v6h4V10"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-back" data-tip="Back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-forward" data-tip="Forward">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-reload" data-tip="Reload">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4v5h5M20 20v-5h-5"/>
          <path d="M4.06 15a8 8 0 101.34-6.55"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-bookmarks" data-tip="Bookmarks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-history" data-tip="History">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 7v5l3 3"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-group bottom">
      <button class="sb-btn" id="btn-bg" data-tip="Background">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
      </button>
      <button class="sb-btn" id="btn-settings" data-tip="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- MAIN COLUMN -->
  <div id="main">

    <!-- ADDRESS / TOOLBAR -->
    <div id="toolbar">
      <div id="url-bar-wrap">
        <!-- Engine toggle icon -->
        <button id="engine-toggle" class="engine-btn" title="Switch search engine"></button>
        <!-- Address input -->
        <input id="url-input" type="text" placeholder="Search or enter address…" autocomplete="off" spellcheck="false"/>
        <!-- Go / Stop -->
        <button id="go-btn">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
          </svg>
        </button>
      </div>
      <div id="engine-label-bar">DuckDuckGo · Private</div>
    </div>

    <!-- HOME SCREEN -->
    <div id="home-screen">

      <div id="greeting-wrap">
        <h1 id="greeting-text">Good morning</h1>
        <p id="date-text"></p>
      </div>

      <!-- RECENT SEARCHES -->
      <div id="recents-wrap" class="hidden">
        <div class="section-label">Recent</div>
        <div id="recents-list"></div>
      </div>

      <!-- QUICK LINKS GRID -->
      <div id="quick-grid"></div>

    </div>

    <!-- NOVA VIEWPORT IFRAME -->
    <iframe id="nova-viewport" class="hidden"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock allow-top-navigation"
      allow="fullscreen; autoplay"
      src="about:blank">
    </iframe>

    <!-- STATUS BAR -->
    <div id="statusbar">
      <span id="status-url">Nova Browser · UU Production</span>
      <span id="idle-countdown"></span>
      <span id="clock"></span>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script src="script.js"></script>
</body>
</html>
